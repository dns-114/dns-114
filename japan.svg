<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <rect width="600" height="700" fill="#0d0d0d" rx="12"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="350" x2="600" y2="350" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="700" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Glow filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- HOKKAIDO -->
  <path filter="url(#glow)" fill="#E0182D" fill-opacity="0.85" stroke="#ff4444" stroke-width="0.8"
    d="M 310 60
       C 295 55, 270 62, 258 75
       C 245 88, 238 105, 242 120
       C 246 135, 255 145, 268 150
       C 280 155, 295 152, 308 145
       C 325 136, 340 120, 348 105
       C 356 90, 352 72, 340 65
       Z"/>
  <!-- Hokkaido eastern peninsula -->
  <path filter="url(#glow)" fill="#E0182D" fill-opacity="0.85" stroke="#ff4444" stroke-width="0.8"
    d="M 340 80 C 355 78, 375 85, 385 100 C 392 112, 388 128, 378 135 C 365 143, 350 138, 340 128 Z"/>

  <!-- HONSHU - main island -->
  <path filter="url(#glow)" fill="#c0121f" fill-opacity="0.9" stroke="#ff4444" stroke-width="0.8"
    d="M 265 165
       C 258 172, 252 182, 248 195
       C 242 212, 240 230, 244 248
       C 248 265, 258 278, 268 290
       C 275 300, 278 312, 272 322
       C 265 334, 252 340, 245 352
       C 238 364, 238 378, 244 390
       C 250 402, 260 410, 272 415
       C 285 420, 300 418, 312 410
       C 326 400, 334 385, 338 368
       C 342 350, 338 332, 330 316
       C 322 300, 310 288, 305 272
       C 300 256, 302 238, 310 223
       C 318 208, 330 196, 338 182
       C 344 170, 342 158, 334 150
       C 326 143, 314 142, 304 148
       C 292 155, 278 162, 265 165
       Z"/>

