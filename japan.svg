  <path filter="url(#glow)" fill="#c0121f" fill-opacity="0.85" stroke="#ff4444" stroke-width="0.6"
    d="M 272 350 C 265 360, 260 375, 263 388 C 266 400, 275 408, 285 405 C 295 402, 300 390, 297 378 C 294 366, 284 356, 272 350 Z"/>

  <!-- SHIKOKU -->
  <path filter="url(#glow)" fill="#E0182D" fill-opacity="0.82" stroke="#ff4444" stroke-width="0.7"
    d="M 248 420
       C 238 425, 228 435, 225 447
       C 222 460, 228 472, 238 478
       C 250 484, 265 480, 275 470
       C 286 460, 290 445, 285 433
       C 280 422, 264 416, 248 420
