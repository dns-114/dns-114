  <line x1="550" y1="70" x2="550" y2="330" stroke="#505050" stroke-width="0.6" opacity="0.5"/>
  <line x1="800" y1="75" x2="800" y2="325" stroke="#808080" stroke-width="0.8" opacity="0.6"/>
  <line x1="300" y1="65" x2="300" y2="335" stroke="#505050" stroke-width="0.6" opacity="0.5"/>
  <line x1="650" y1="60" x2="650" y2="340" stroke="#808080" stroke-width="0.8" opacity="0.6"/>
  
