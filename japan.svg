  <line x1="350" y1="60" x2="350" y2="340" stroke="#B0B0B0" stroke-width="1.2" opacity="0.7"/>
  <line x1="500" y1="55" x2="500" y2="345" stroke="#E0E0E0" stroke-width="1.6" opacity="0.8"/>
