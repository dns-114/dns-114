<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- Background - Pure Black -->
  <rect width="1200" height="400" fill="#000000"/>
  
  <!-- Tokyo Bay - right side (subtle dark blue outline) -->
  <path d="M 900 50 
           Q 950 100, 980 150
           Q 1000 200, 980 250
           Q 950 300, 900 350
           L 900 50 Z"
        fill="none" stroke="#0a1a2a" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Rivers - Sumida, Arakawa, Tamagawa (dark blue) -->
  <path d="M 550 0 Q 560 80, 570 160 Q 580 240, 590 320 L 595 400" 
        stroke="#0d1f3d" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 400 0 Q 410 100, 420 200 Q 430 300, 440 400" 
        stroke="#0d1f3d" stroke-width="1.8" fill="none" opacity="0.35"/>
  <path d="M 300 300 Q 400 320, 500 330 Q 700 340, 900 360" 
        stroke="#0d1f3d" stroke-width="2.2" fill="none" opacity="0.4"/>
  
  <!-- Major expressways/highways - bright white -->
  <!-- Shuto Expressway system -->
  <path d="M 100 200 Q 250 190, 400 195 Q 550 200, 700 195 Q 800 190, 880 200" 
        stroke="#FFFFFF" stroke-width="2.8" fill="none" opacity="0.95"/>
  <path d="M 300 100 Q 350 150, 400 200 Q 450 250, 500 280" 
        stroke="#FFFFFF" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M 500 120 Q 530 160, 560 200 Q 590 240, 620 280" 
        stroke="#FFFFFF" stroke-width="2.5" fill="none" opacity="0.9"/>
  
  <!-- Ring roads -->
  <ellipse cx="450" cy="200" rx="200" ry="130" 
           fill="none" stroke="#E8E8E8" stroke-width="2.2" opacity="0.85"/>
  <ellipse cx="450" cy="200" rx="280" ry="160" 
           fill="none" stroke="#D0D0D0" stroke-width="1.8" opacity="0.75"/>
  
  <!-- Primary roads - grid pattern radiating from center -->
  <!-- Horizontal main roads -->
  <path d="M 50 140 L 150 138 L 250 142 L 350 140 L 450 145 L 550 142 L 650 140 L 750 143 L 850 140" 
        stroke="#E0E0E0" stroke-width="1.9" fill="none" opacity="0.85"/>
  <path d="M 80 260 L 180 258 L 280 262 L 380 260 L 480 265 L 580 262 L 680 260 L 780 263 L 870 260" 
        stroke="#E0E0E0" stroke-width="1.9" fill="none" opacity="0.85"/>
  <path d="M 100 180 Q 300 175, 500 185 Q 700 190, 860 180" 
        stroke="#E0E0E0" stroke-width="1.8" fill="none" opacity="0.8"/>
  <path d="M 120 220 Q 320 215, 520 225 Q 720 230, 870 220" 
        stroke="#E0E0E0" stroke-width="1.8" fill="none" opacity="0.8"/>
  
  <!-- Radial roads from center (Tokyo Station area ~450,200) -->
  <line x1="450" y1="200" x2="250" y2="100" stroke="#D5D5D5" stroke-width="1.6" opacity="0.8"/>
  <line x1="450" y1="200" x2="650" y2="120" stroke="#D5D5D5" stroke-width="1.6" opacity="0.8"/>
  <line x1="450" y1="200" x2="700" y2="300" stroke="#D5D5D5" stroke-width="1.6" opacity="0.8"/>
  <line x1="450" y1="200" x2="250" y2="310" stroke="#D5D5D5" stroke-width="1.6" opacity="0.8"/>
  <line x1="450" y1="200" x2="150" y2="200" stroke="#D5D5D5" stroke-width="1.6" opacity="0.8"/>
  <line x1="450" y1="200" x2="750" y2="200" stroke="#D5D5D5" stroke-width="1.6" opacity="0.8"/>
  
  <!-- Secondary roads - denser network in central area -->
  <path d="M 200 90 L 300 92 L 400 88 L 500 95 L 600 90 L 700 93 L 800 90" 
        stroke="#B0B0B0" stroke-width="1.3" fill="none" opacity="0.7"/>
  <path d="M 180 310 L 280 308 L 380 315 L 480 310 L 580 313 L 680 308 L 780 312 L 860 310" 
        stroke="#B0B0B0" stroke-width="1.3" fill="none" opacity="0.7"/>
  <path d="M 220 160 L 320 158 L 420 165 L 520 160 L 620 163 L 720 158 L 820 162" 
        stroke="#B0B0B0" stroke-width="1.2" fill="none" opacity="0.68"/>
  <path d="M 200 240 L 300 238 L 400 245 L 500 240 L 600 243 L 700 238 L 800 242 L 880 240" 
        stroke="#B0B0B0" stroke-width="1.2" fill="none" opacity="0.68"/>
  
  <!-- Tertiary roads - dense urban grid -->
  <path d="M 250 110 L 350 112 L 450 108 L 550 115 L 650 110 L 750 113" 
        stroke="#808080" stroke-width="0.9" fill="none" opacity="0.6"/>
  <path d="M 230 290 L 330 288 L 430 295 L 530 290 L 630 293 L 730 288 L 830 292" 
        stroke="#808080" stroke-width="0.9" fill="none" opacity="0.6"/>
  <path d="M 270 130 L 370 132 L 470 128 L 570 135 L 670 130 L 770 133" 
        stroke="#808080" stroke-width="0.85" fill="none" opacity="0.58"/>
  <path d="M 250 270 L 350 268 L 450 275 L 550 270 L 650 273 L 750 268" 
        stroke="#808080" stroke-width="0.85" fill="none" opacity="0.58"/>
  
  <!-- Residential streets - very dense in central Tokyo -->
  <path d="M 280 150 L 380 152 L 480 148 L 580 155 L 680 150" 
        stroke="#505050" stroke-width="0.6" fill="none" opacity="0.45"/>
  <path d="M 260 250 L 360 248 L 460 255 L 560 250 L 660 253 L 760 248" 
        stroke="#505050" stroke-width="0.6" fill="none" opacity="0.45"/>
  <path d="M 300 170 L 400 172 L 500 168 L 600 175 L 700 170" 
        stroke="#505050" stroke-width="0.55" fill="none" opacity="0.42"/>
  <path d="M 280 230 L 380 228 L 480 235 L 580 230 L 680 233" 
        stroke="#505050" stroke-width="0.55" fill="none" opacity="0.42"/>
  
  <!-- Vertical streets -->
  <line x1="200" y1="80" x2="200" y2="320" stroke="#808080" stroke-width="0.8" opacity="0.55"/>
  <line x1="300" y1="70" x2="300" y2="330" stroke="#B0B0B0" stroke-width="1.1" opacity="0.65"/>
  <line x1="400" y1="60" x2="400" y2="340" stroke="#D0D0D0" stroke-width="1.4" opacity="0.75"/>
  <line x1="500" y1="55" x2="500" y2="345" stroke="#E0E0E0" stroke-width="1.7" opacity="0.8"/>
  <line x1="600" y1="60" x2="600" y2="340" stroke="#D0D0D0" stroke-width="1.4" opacity="0.75"/>
  <line x1="700" y1="70" x2="700" y2="330" stroke="#B0B0B0" stroke-width="1.1" opacity="0.65"/>
  <line x1="800" y1="80" x2="800" y2="320" stroke="#808080" stroke-width="0.8" opacity="0.55"/>
  
  <!-- Additional density - small cross streets -->
  <line x1="350" y1="120" x2="350" y2="280" stroke="#606060" stroke-width="0.6" opacity="0.5"/>
  <line x1="450" y1="110" x2="450" y2="290" stroke="#707070" stroke-width="0.7" opacity="0.55"/>
  <line x1="550" y1="115" x2="550" y2="285" stroke="#707070" stroke-width="0.7" opacity="0.55"/>
  <line x1="650" y1="120" x2="650" y2="280" stroke="#606060" stroke-width="0.6" opacity="0.5"/>
  
  <!-- Major intersections/hubs -->
  <!-- Tokyo Station area -->
  <circle cx="450" cy="200" r="4" fill="#FFFFFF" opacity="0.85"/>
  <!-- Shinjuku area (west) -->
  <circle cx="300" cy="180" r="3.5" fill="#F0F0F0" opacity="0.8"/>
  <!-- Shibuya area (southwest) -->
  <circle cx="350" cy="240" r="3" fill="#E8E8E8" opacity="0.75"/>
  <!-- Ikebukuro area (north) -->
  <circle cx="400" cy="140" r="2.8" fill="#E0E0E0" opacity="0.7"/>
  <!-- Ueno area -->
  <circle cx="520" cy="160" r="2.5" fill="#D8D8D8" opacity="0.68"/>
  
  <!-- Text labels -->
  <text x="600" y="375" font-family="sans-serif" font-size="26" font-weight="300" fill="#FFFFFF" text-anchor="middle" opacity="0.92">TOKYO</text>
  <text x="600" y="392" font-family="sans-serif" font-size="11" font-weight="300" fill="#999999" text-anchor="middle" opacity="0.7">東京 • 35.6762° N, 139.6503° E</text>
</svg>
