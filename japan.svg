  <path d="M 100 100 L 400 300" stroke="#B0B0B0" stroke-width="1.1" fill="none" opacity="0.7"/>
  <path d="M 500 80 L 800 320" stroke="#E0E0E0" stroke-width="1.5" fill="none" opacity="0.75"/>
  <path d="M 300 350 L 700 70" stroke="#808080" stroke-width="0.9" fill="none" opacity="0.65"/>
  <path d="M 850 100 L 1100 280" stroke="#505050" stroke-width="0.7" fill="none" opacity="0.55"/>
  
  <!-- Major intersections/nodes -->
