  <circle cx="750" cy="240" r="2" fill="#B0B0B0" opacity="0.7"/>
  <circle cx="900" cy="180" r="1.8" fill="#B0B0B0" opacity="0.65"/>
  
  <!-- Text labels -->
  <text x="600" y="375" font-family="sans-serif" font-size="24" font-weight="300" fill="#FFFFFF" text-anchor="middle" opacity="0.9">TOKYO</text>
  <text x="600" y="390" font-family="sans-serif" font-size="12" font-weight="300" fill="#888888" text-anchor="middle" opacity="0.7">東京 • 35.6762° N, 139.6503° E</text>
