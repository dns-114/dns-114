  <!-- Label -->
  <text x="390" y="300" font-family="monospace" font-size="13" fill="#ff4444" opacity="0.7">日本</text>
  <text x="390" y="318" font-family="monospace" font-size="9" fill="#888" opacity="0.6">JAPAN</text>

  <!-- Coordinates hint -->
  <text x="12" y="692" font-family="monospace" font-size="8" fill="#333">35.6762° N, 139.6503° E</text>
</svg>
