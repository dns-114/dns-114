  <!-- Ryukyu chain (simplified dots) -->
  <circle filter="url(#glow)" cx="185" cy="500" r="5" fill="#E0182D" fill-opacity="0.75" stroke="#ff4444" stroke-width="0.5"/>
  <circle filter="url(#glow)" cx="172" cy="520" r="4" fill="#E0182D" fill-opacity="0.7" stroke="#ff4444" stroke-width="0.5"/>
  <circle filter="url(#glow)" cx="160" cy="540" r="3.5" fill="#E0182D" fill-opacity="0.65" stroke="#ff4444" stroke-width="0.5"/>
  <circle filter="url(#glow)" cx="150" cy="558" r="3" fill="#E0182D" fill-opacity="0.6" stroke="#ff4444" stroke-width="0.5"/>
