<svg viewBox="0 0 520 520" width="520" xmlns="http://www.w3.org/2000/svg">
  <rect width="520" height="520" rx="14" fill="#0d0d0d"/>
  <!-- Grid circles -->
  <circle cx="260" cy="260" r="180" fill="none" stroke="#252525" stroke-width="1.2"/>
  <circle cx="260" cy="260" r="135" fill="none" stroke="#252525" stroke-width="1.2"/>
  <circle cx="260" cy="260" r="90" fill="none" stroke="#252525" stroke-width="1.2"/>
  <circle cx="260" cy="260" r="45" fill="none" stroke="#252525" stroke-width="1.2"/>
  <!-- Scale labels -->
  <text x="264" y="216" fill="#444" font-size="9" font-family="monospace">25</text>
  <text x="264" y="171" fill="#444" font-size="9" font-family="monospace">50</text>
  <text x="264" y="126" fill="#444" font-size="9" font-family="monospace">75</text>
  <text x="264" y="82" fill="#444" font-size="9" font-family="monospace">100</text>
  <!-- Axis lines -->
  <line x1="260" y1="260" x2="260" y2="80" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="260" x2="387" y2="133" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="260" x2="440" y2="260" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="260" x2="387" y2="387" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="260" x2="260" y2="440" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="260" x2="133" y2="387" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="260" x2="80" y2="260" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="260" x2="133" y2="133" stroke="#333" stroke-width="1"/>
  <!-- Data polygon -->
  <!-- Scores (out of 100), r = score * 1.8 -->
  <!-- 0 Systems Prog  90 -> r=162  angle=-90  -> 260, 260-162=98 -->
  <!-- 1 Cryptography  88 -> r=158  angle=-45  -> 260+112=372, 260-112=148 -->
  <!-- 2 Network Sec   82 -> r=148  angle=0    -> 260+148=408, 260 -->
  <!-- 3 Bin/Reverse   60 -> r=108  angle=45   -> 260+76=336, 260+76=336 -->
  <!-- 4 Pentest       35 -> r=63   angle=90   -> 260, 260+63=323 -->
  <!-- 5 Embedded IoT  65 -> r=117  angle=135  -> 260-83=177, 260+83=343 -->
  <!-- 6 OS Internals  85 -> r=153  angle=180  -> 260-153=107, 260 -->
  <!-- 7 Mathematics   88 -> r=158  angle=225  -> 260-112=148, 260-112=148 -->
  <polygon
    points="260,98 372,148 408,260 336,336 260,323 177,343 107,260 148,148"
    fill="rgba(224,24,45,0.15)"
    stroke="#E0182D"
    stroke-width="2.2"
    stroke-linejoin="round"
  />
  <!-- Dot markers -->
  <circle cx="260" cy="98"  r="5" fill="#E0182D"/>
  <circle cx="372" cy="148" r="5" fill="#E0182D"/>
  <circle cx="408" cy="260" r="5" fill="#E0182D"/>
  <circle cx="336" cy="336" r="5" fill="#E0182D"/>
  <circle cx="260" cy="323" r="5" fill="#c0392b"/>
  <circle cx="177" cy="343" r="5" fill="#E0182D"/>
  <circle cx="107" cy="260" r="5" fill="#E0182D"/>
  <circle cx="148" cy="148" r="5" fill="#E0182D"/>
  <!-- Labels -->
  <text x="260" y="66" text-anchor="middle" fill="#dddddd" font-size="12" font-family="monospace" font-weight="bold">Systems Prog.</text>
  <text x="397" y="120" text-anchor="start" fill="#dddddd" font-size="12" font-family="monospace" font-weight="bold">Cryptography</text>
  <text x="446" y="264" text-anchor="start" fill="#dddddd" font-size="12" font-family="monospace" font-weight="bold">Network Sec.</text>
  <text x="350" y="365" text-anchor="start" fill="#dddddd" font-size="12" font-family="monospace">Bin / Reverse</text>
  <text x="260" y="466" text-anchor="middle" fill="#aaaaaa" font-size="11" font-family="monospace" font-style="italic">Pentest</text>
  <text x="168" y="370" text-anchor="end" fill="#dddddd" font-size="12" font-family="monospace">Embedded/IoT</text>
  <text x="72" y="264" text-anchor="end" fill="#dddddd" font-size="12" font-family="monospace" font-weight="bold">OS Internals</text>
  <text x="125" y="118" text-anchor="end" fill="#dddddd" font-size="12" font-family="monospace" font-weight="bold">Mathematics</text>
  <!-- Legend -->
  <circle cx="170" cy="496" r="5" fill="#E0182D"/>
  <text x="180" y="500" fill="#888" font-size="10" font-family="monospace">Proficient</text>
  <circle cx="260" cy="496" r="5" fill="#c0392b"/>
  <text x="270" y="500" fill="#888" font-size="10" font-family="monospace">Working</text>
  <circle cx="340" cy="496" r="5" fill="#922b21"/>
  <text x="350" y="500" fill="#888" font-size="10" font-family="monospace">Learning</text>
</svg>
